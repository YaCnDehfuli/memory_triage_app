# Serves the built SPA and reverse-proxies the API. SSE (the progress stream)
# needs buffering disabled and a long read timeout so events flush immediately.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline hardening headers (the API sets its own on JSON responses).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # Server-Sent Events: stream without buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
